name: Reproducible performance benchmark

on:
  schedule:
    - cron: "41 5 * * 1"
  workflow_dispatch:
    inputs:
      size:
        description: Synthetic gallery size
        required: true
        default: "1000"
        type: choice
        options:
          - "100"
          - "1000"
          - "3000"
          - "5000"

permissions:
  contents: read

concurrency:
  group: performance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      CI: true
      TURBO_TELEMETRY_DISABLED: 1
      BENCHMARK_SIZE: ${{ inputs.size || '1000' }}

    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build production application
        run: npm --workspace @photo-manager/desktop run build

      - name: Run benchmark
        shell: pwsh
        run: |
          npm --workspace @photo-manager/desktop run benchmark:reproducible -- `
            $env:BENCHMARK_SIZE `
            "test-results/performance-$env:BENCHMARK_SIZE.json"

      - name: Upload benchmark report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: performance-${{ env.BENCHMARK_SIZE }}-${{ github.run_id }}
          path: test-results/performance-${{ env.BENCHMARK_SIZE }}.json
          if-no-files-found: error
          retention-days: 30
