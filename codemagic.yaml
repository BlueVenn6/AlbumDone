workflows:
  ios-testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m1
    max_build_duration: 60
    integrations:
      app_store_connect: Photo Manager App Store Connect
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.linkvectorapp.albumdone
        XCODE_WORKSPACE: packages/mobile/ios/HelloWorld.xcworkspace
        XCODE_SCHEME: HelloWorld
    scripts:
      - name: Install workspace dependencies
        script: npm install
      - name: Verify iOS native project exists
        script: |
          cd packages/mobile
          npm run ensure:native:ios
      - name: Install CocoaPods
        script: |
          cd packages/mobile/ios
          pod install --repo-update
      - name: Apply signing profiles
        script: xcode-project use-profiles
      - name: Build IPA for TestFlight
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

# Codemagic 侧需要手工补齐：
# 1. App Store Connect integration：名称需与上方 `Photo Manager App Store Connect` 一致。
# 2. Apple Developer Team、Bundle ID `com.linkvectorapp.albumdone`、证书与 Provisioning Profile。
# 3. App Store Connect 中的应用记录与内部测试组 `Internal Testers`。
